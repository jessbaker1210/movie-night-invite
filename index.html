<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fall Movie Night</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="fall-theme">

<div class="overlay">

  <h1>🍂 Movie Night Under the Stars 🍂</h1>

  <div id="countdown"></div>

  <button onclick="toggleMusic()">🎶 Play / Pause Music</button>

  <div class="card">
    <p>Join us for a cozy fall evening ✨</p>

    <p>🎬 <span class="highlight">Movie:</span> Hocus Pocus</p>
    <p>📅 <span class="highlight">Date:</span> October 14</p>
    <p>🕰 <span class="highlight">Time:</span> 6:30 PM</p>
    <p>📍 212 Private Road 350</p>

    <p>🍿 Popcorn & warm drinks provided</p>

    <h3>RSVP</h3>

    <input type="text" id="guestName" placeholder="Enter your name" />

    <a class="btn" href="sms:+19013563530">📱 Text RSVP</a>

    <br><br>

    <button onclick="rsvp()">✅ I'm Attending</button>

    <p id="confirmation"></p>
    <p id="guestCount"></p>

    <ul id="guestList"></ul>
  </div>

</div>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_9464bfa2b3.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
