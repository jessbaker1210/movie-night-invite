<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fall Movie Night</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: url("https://images.unsplash.com/photo-1507371341162-763b5e419408") no-repeat center center/cover;
  color: white;
  overflow-x: hidden;
}

.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 30px;
  text-align: center;
}

h1 {
  font-size: 3em;
  color: #f8c471;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 25px;
  max-width: 500px;
  margin: 20px auto;
}

.highlight {
  color: #f5b041;
  font-weight: bold;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: #f39c12;
  color: white;
  font-size: 1em;
  cursor: pointer;
}

button:hover {
  background: #d68910;
}

/* 🍁 Falling Leaves */
.leaf {
  position: fixed;
  top: -10px;
  width: 20px;
  height: 20px;
  background: orange;
  opacity: 0.8;
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="overlay">
  <h1>🍂 Movie Night Under the Stars 🍂</h1>

  <div class="card">
    <p>Join us for a cozy fall evening of film, friends, and fun ✨</p>

    <p>🎬 <span class="highlight">Movie:</span> Hocus Pocus</p>
    <p>📅 <span class="highlight">Date:</span> October 14</p>
    <p>🕰 <span class="highlight">Time:</span> 6:30 PM (Movie at sunset)</p>
    <p>📍 <span class="highlight">Location:</span> Maple Street Park</p>

    <p>🍿 Popcorn & warm drinks provided!</p>

    <h3>RSVP</h3>

    <!-- SIMPLE RSVP FORM -->
    <form action="https://formspree.io/f/yourformid" method="POST">
      <input type="text" name="name" placeholder="Your Name" required><br>
      <input type="email" name="email" placeholder="Your Email"><br>
      <textarea name="message" placeholder="Number attending or note"></textarea><br>
      <button type="submit">Submit RSVP</button>
    </form>

    <p style="font-size: 0.8em;">(Replace form link with your own for live responses)</p>
  </div>

</div>

<script>
// 🍁 Generate Falling Leaves
for (let i = 0; i < 20; i++) {
  let leaf = document.createElement("div");
  leaf.className = "leaf";

  leaf.style.left = Math.random() * 100 + "vw";
  leaf.style.animationDuration = (5 + Math.random() * 5) + "s";
  leaf.style.opacity = Math.random();

  document.body.appendChild(leaf);
}
</script>

</body>
</html>
